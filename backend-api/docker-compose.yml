services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH_USERNAME: "${ME_USERNAME}"
      ME_CONFIG_BASICAUTH_PASSWORD: "${ME_PASSWORD}"
    depends_on:
      - mongo

volumes:
  mongo-data:
